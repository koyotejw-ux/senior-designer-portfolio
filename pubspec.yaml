name: senior_designer_portfolio
description: "Jaewoong Jung - Senior Product Designer Portfolio Platform"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  flutter_svg: ^2.0.10

  flutter_riverpod: ^2.5.1
  
  go_router: ^14.2.7
  
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  firebase_storage: ^12.3.4
  cloud_firestore: ^5.4.4
  
  pdf: ^3.11.1
  printing: ^5.13.2
  
  file_picker: ^8.1.2
  image_picker: ^1.1.2
  
  intl: ^0.19.0
  uuid: ^4.5.1
  cached_network_image: ^3.4.1
  url_launcher: ^6.3.1
  
  fl_chart: ^0.69.0
  
  lottie: ^3.1.3
  visibility_detector: ^0.4.0+2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
