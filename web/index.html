  <script>
    /**
     * Dart에서 Uint8Array를 직접 받아 PDF 파일로 저장합니다.
     * Base64 인코딩을 사용하지 않으므로 크롬에서도 대용량 파일을 안정적으로 다운로드합니다.
     *
     * @param {Uint8Array} bytesArray - 파일 바이트 (Dart Uint8List → JSUint8Array)
     * @param {string} fileName      - 저장할 파일명 (예: portfolio_master.pdf)
     * @param {string} mimeType      - MIME 타입 (예: application/pdf)
     */
    function downloadFileFromBytes(bytesArray, fileName, mimeType) {
      try {
        // 1. Blob 생성 — Uint8Array를 직접 사용 (Base64 변환 없음)
        var blob = new Blob([bytesArray], { type: mimeType || 'application/pdf' });

        // 2. msSaveBlob (IE/Legacy Edge 지원)
        if (window.navigator && window.navigator.msSaveOrOpenBlob) {
          window.navigator.msSaveOrOpenBlob(blob, fileName);
          return;
        }

        // 3. 표준 anchor download 방식 (Chrome, Firefox, Safari)
        var url = URL.createObjectURL(blob);
        var link = document.createElement('a');
        link.style.display = 'none';
        link.href = url;
        link.setAttribute('download', fileName);

        // body에 추가해야 Chrome에서 click이 동작합니다
        document.body.appendChild(link);

        // 동기적 click (Chrome 호환)
        link.click();

        // 120초 뒤 정리 (대용량 다운로드 완료 대기)
        setTimeout(function() {
          if (link.parentNode) link.parentNode.removeChild(link);
          URL.revokeObjectURL(url);
        }, 120000);

      } catch (e) {
        console.error('[downloadFileFromBytes] Error:', e);
        // 폴백: 새 탭에서 Blob URL 열기
        try {
          var fallbackBlob = new Blob([bytesArray], { type: mimeType || 'application/pdf' });
          var fallbackUrl = URL.createObjectURL(fallbackBlob);
          window.open(fallbackUrl, '_blank');
        } catch (e2) {
          console.error('[downloadFileFromBytes] Fallback also failed:', e2);
        }
      }
    }
  </script>
