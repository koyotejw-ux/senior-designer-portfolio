  <!-- FileSaver.js for reliable PDF/file downloads -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
  <script>
    // Called from Dart via JS interop to save a file with a correct filename
    function savePdfFile(uint8Array, fileName, mimeType) {
      try {
        var blob = new Blob([uint8Array], { type: mimeType || 'application/pdf' });
        saveAs(blob, fileName);
      } catch (e) {
        console.error('savePdfFile error:', e);
        // Fallback: direct anchor approach with long-lived URL
        var url = URL.createObjectURL(new Blob([uint8Array], { type: mimeType || 'application/pdf' }));
        var a = document.createElement('a');
        a.href = url;
        a.download = fileName;
        a.style.display = 'none';
        document.body.appendChild(a);
        a.click();
        setTimeout(function() { a.remove(); URL.revokeObjectURL(url); }, 30000);
      }
    }
  </script>
